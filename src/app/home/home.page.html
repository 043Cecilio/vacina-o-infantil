<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title class="app-title">Sua Família - Saúde Infantil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <div class="section-container ion-margin-bottom">
    <div class="carousel-top-row">
      <button class="campaign-button" type="button" [routerLink]="['/campaigns']">Veja todas as campanhas</button>
    </div>

    <div class="carousel-container">
      <button class="carousel-arrow carousel-arrow-left" (click)="prevBanner()" type="button" aria-label="Banner anterior">
        ‹
      </button>

      <div class="banner-display">
        <img
          [src]="banners[currentBannerIndex]"
          [alt]="'Banner ' + (currentBannerIndex + 1)"
          class="campaign-banner-image"
        />
      </div>

      <button class="carousel-arrow carousel-arrow-right" (click)="nextBanner()" type="button" aria-label="Próximo banner">
        ›
      </button>
    </div>
  </div>

  <div class="section-container ion-margin-top">
    <div class="children-header-row">
      <h2 class="children-title">Suas Crianças</h2>
      <button class="register-button" type="button" [routerLink]="['/register-child']">
        <span class="register-button-icon">+</span>
        <span>Solicitar cadastro</span>
      </button>
    </div>
    
    <ion-grid style="padding: 0;">
      <ion-row>
        <ion-col size="12" size-md="6" *ngFor="let child of childrenList" style="padding: 8px 0;">
          <ion-card class="child-card" style="margin: 0 4px;">
            <ion-card-header>
              <div class="child-card-header">
                <ion-card-title class="child-card-title">{{ child.name }}</ion-card-title>
                
                <ion-badge [color]="child.hasAlert ? 'danger' : 'success'" class="child-status-badge" [ngClass]="child.hasAlert ? 'child-status-badge-warning' : 'child-status-badge-success'">
                  {{ child.statusResumo }}
                </ion-badge>
              </div>
              <ion-card-subtitle class="child-card-subtitle">Nascimento: {{ child.birthDate | date:'dd/MM/yyyy' }}</ion-card-subtitle>
            </ion-card-header>

            <ion-card-content>
              <p *ngIf="child.hasAlert" class="child-card-alert">
                Há vacinas obrigatórias com o prazo ultrapassado!
              </p>
              <p *ngIf="!child.hasAlert" class="child-card-success">
                Todas as vacinas previstas estão regulares.
              </p>
              
              <ion-button expand="block" color="primary" class="child-card-button" [routerLink]="['/child-detail', child.id]">
                Ver Carteira de Vacinas
              </ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

</ion-content>
