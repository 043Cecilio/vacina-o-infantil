<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title class="app-title">Sua Família - Saúde Infantil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <div class="section-container ion-margin-bottom">
    <div class="carousel-container">
      <button class="carousel-arrow carousel-arrow-left" (click)="prevBanner()" type="button" aria-label="Banner anterior">
        ‹
      </button>

      <div class="banner-display">
        <img
          [src]="banners[currentBannerIndex]"
          [alt]="'Banner ' + (currentBannerIndex + 1)"
          class="campaign-banner-image"
        />
      </div>

      <button class="carousel-arrow carousel-arrow-right" (click)="nextBanner()" type="button" aria-label="Próximo banner">
        ›
      </button>
    </div>
  </div>

  <div class="section-container ion-margin-top">
    <h2 style="color: var(--vax-dark); font-weight: bold;">👶 Suas Crianças</h2>
    
    <ion-grid style="padding: 0;">
      <ion-row>
        <ion-col size="12" size-md="6" *ngFor="let child of childrenList" style="padding: 8px 0;">
          <ion-card style="margin: 0 4px;">
            <ion-card-header>
              <div style="display: flex; justify-content: space-between; align-items: center;">
                <ion-card-title style="color: var(--vax-dark); font-weight: bold;">{{ child.name }}</ion-card-title>
                
                <ion-badge [color]="child.hasAlert ? 'danger' : 'success'">
                  {{ child.statusResumo }}
                </ion-badge>
              </div>
              <ion-card-subtitle>Nascimento: {{ child.birthDate | date:'dd/MM/yyyy' }}</ion-card-subtitle>
            </ion-card-header>

            <ion-card-content>
              <p *ngIf="child.hasAlert" style="color: var(--vax-alert); font-weight: 500;">
                ⚠️ Há vacinas obrigatórias com o prazo ultrapassado!
              </p>
              <p *ngIf="!child.hasAlert" style="color: var(--vax-success); font-weight: 500;">
                ✅ Todas as vacinas previstas estão regulares.
              </p>
              
              <ion-button expand="block" color="primary" style="margin-top: 15px;" [routerLink]="['/child-detail', child.id]">
                Ver Carteira de Vacinas
              </ion-button>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>
    </ion-grid>
  </div>

</ion-content>
